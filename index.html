<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #151515; }
        body {
            background-color: var(--dark); color: #e0e0e0;
            font-family: 'Roboto Mono', monospace; margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        h1, h2 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin: 15px 0; }
        
        .content { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .content.active { display: block; }

        /* Меню игрока */
        .hero-card {
            width: 160px; height: 220px; background: linear-gradient(180deg, #222, #050505);
            border: 1px solid var(--gold); border-radius: 15px;
            margin: 0 auto 20px; display: flex; justify-content: center; align-items: center;
            font-size: 100px; box-shadow: 0 0 20px rgba(212,175,55,0.1);
        }
        .stats-grid { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .val { color: var(--gold); font-weight: bold; }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .inv-slot { aspect-ratio: 1/1; background: #1a1a1a; border: 1px dashed #444; border-radius: 8px; }

        /* Локации */
        .loc-btn {
            background: var(--card); border: 1px solid #333; color: white;
            padding: 15px; margin-bottom: 12px; border-radius: 10px; width: 100%;
            text-align: left; font-family: 'Roboto Mono';
        }
        .loc-btn:active { transform: scale(0.98); border-color: var(--gold); }
        .enemy-info { font-size: 12px; color: #888; display: block; }

        /* Навигация */
        .nav-bar { background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #555; font-size: 11px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); font-weight: bold; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="tab-menu" class="content active">
        <h1>Ancient RPG</h1>
        <div class="hero-card">👤</div>
        <div class="stats-grid" id="main-stats">
            </div>
    </div>

    <div id="tab-inv" class="content">
        <h2>Инвентарь</h2>
        <div class="inv-grid">
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
    </div>

    <div id="tab-loc" class="content">
        <h2>Локации</h2>
        <button class="loc-btn" onclick="fight('Лес', 10)">
            🌲 Лесная чаща <span class="enemy-info">Враг: Гоблин | Награда: 10 🪙</span>
        </button>
        <button class="loc-btn" onclick="fight('Равнины', 25)">
            🌫 Туманные Равнины <span class="enemy-info">Враг: Скелет | Награда: 25 🪙</span>
        </button>
        <button class="loc-btn" onclick="fight('Руины', 100)">
            🏛 Древние руины <span class="enemy-info">Враг: Дракон | Награда: 100 🪙</span>
        </button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="openTab('menu', this)">Меню</div>
        <div class="nav-item" onclick="openTab('inv', this)">Инвентарь</div>
        <div class="nav-item" onclick="openTab('loc', this)">Локации</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Загрузка данных из URL
        const params = new URLSearchParams(window.location.search);
        let playerData = {
            lvl: parseInt(params.get('lvl')) || 1,
            hp: parseInt(params.get('hp')) || 100,
            def: parseInt(params.get('def')) || 15,
            coins: parseInt(params.get('coins')) || 0
        };

        function updateUI() {
            document.getElementById('main-stats').innerHTML = `
                <div class="stat-line"><span>Уровень</span> <span class="val">${playerData.lvl}</span></div>
                <div class="stat-line"><span>Здоровье</span> <span class="val" style="color: #ff4747;">${playerData.hp}/100</span></div>
                <div class="stat-line"><span>Защита</span> <span class="val" style="color: #47a1ff;">${playerData.def}</span></div>
                <div class="stat-line"><span>Монеты</span> <span class="val" style="color: #ffd700;">${playerData.coins} 🪙</span></div>
            `;
        }

        function openTab(tabName, el) {
            document.querySelectorAll('.content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            el.classList.add('active');
        }

        function fight(loc, reward) {
            // Простая логика боя: добавляем монеты
            playerData.coins += reward;
            updateUI();
            tg.HapticFeedback.notificationOccurred('success'); // Вибрация при победе
            alert(`Победа в локации ${loc}! Вы получили ${reward} монет.`);
        }

        updateUI(); // Инициализация при запуске
    </script>
</body>
</html>
