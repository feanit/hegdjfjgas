<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .btn { background: #d4af37; color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .enemy-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; margin-top: 5px; text-align: left; border-radius: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; }
        .nav div { flex: 1; text-align: center; padding: 20px; color: #666; font-size: 12px; }
        .nav div.active { color: #d4af37; font-weight: bold; }
        #log { background: #000; height: 120px; overflow-y: auto; font-size: 12px; padding: 10px; border: 1px solid #d4af37; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <h1>ГЕРОЙ</h1>
        <div class="card" id="stats-display">
            </div>
    </div>

    <div id="loc-page" class="page">
        <h1>ПОХОД</h1>
        <div id="loc-list">
            <div class="card">
                <h3>🌲 Темный Лес</h3>
                <button class="btn" onclick="openLoc('forest')">Войти</button>
            </div>
            <div class="card">
                <h3>🏛 Забытые Руины</h3>
                <button class="btn" onclick="openLoc('ruins')">Войти</button>
            </div>
        </div>

        <div id="enemy-select" style="display:none;">
            <button onclick="showLocs()" style="color: #d4af37; background: none; border: none;">⬅ Назад</button>
            <h2 id="loc-name"></h2>
            <div id="enemies-list"></div>
        </div>

        <div id="battle-ui" style="display:none;">
            <h2 id="target-name"></h2>
            <div id="log"></div>
        </div>
    </div>

    <div class="nav">
        <div id="nav-menu" class="active" onclick="showPage('menu-page')">ГЕРОЙ</div>
        <div id="nav-loc" onclick="showPage('loc-page')">ПОХОД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const urlParams = new URLSearchParams(window.location.search);
        
        let player = {
            lvl: parseInt(urlParams.get('lvl')) || 1,
            atk: parseInt(urlParams.get('atk')) || 12,
            coins: parseInt(urlParams.get('coins')) || 0,
            def: parseInt(urlParams.get('def')) || 15,
            hp: 100
        };

        const world = {
            forest: { name: "Темный Лес", enemies: [
                {n: "Слизь", h: 30, a: 4, r: 15},
                {n: "Разбойник", h: 60, a: 8, r: 40}
            ]},
            ruins: { name: "Забытые Руины", enemies: [
                {n: "Скелет", h: 100, a: 12, r: 90},
                {n: "Призрак", h: 150, a: 20, r: 200}
            ]}
        };

        function renderStats() {
            document.getElementById('stats-display').innerHTML = `
                <p>Уровень: <b>${player.lvl}</b></p>
                <p>Атака: <b style="color: #ff4747;">${player.atk} ⚔️</b></p>
                <p>Защита: <b>${player.def}</b></p>
                <p>Золото: <b style="color: #d4af37;">${player.coins} 🪙</b></p>
            `;
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav div').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
        }

        function openLoc(key) {
            document.getElementById('loc-list').style.display = 'none';
            document.getElementById('enemy-select').style.display = 'block';
            document.getElementById('loc-name').innerText = world[key].name;
            let html = '';
            world[key].enemies.forEach(e => {
                html += `<button class="enemy-btn" onclick="startBattle('${e.n}', ${e.h}, ${e.a}, ${e.r})">
                    🗡 ${e.n} (HP: ${e.h}, ATK: ${e.a})
                </button>`;
            });
            document.getElementById('enemies-list').innerHTML = html;
        }

        function showLocs() {
            document.getElementById('loc-list').style.display = 'block';
            document.getElementById('enemy-select').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'none';
        }

        function startBattle(name, eHp, eAtk, reward) {
            document.getElementById('enemy-select').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'block';
            document.getElementById('target-name').innerText = name;
            let log = document.getElementById('log');
            log.innerHTML = "⚔️ Сражение началось!<br>";
            
            let curE = eHp, curP = player.hp;
            let fight = setInterval(() => {
                let pDmg = Math.floor(player.atk * (0.8 + Math.random()*0.4));
                curE -= pDmg;
                log.innerHTML += `Ты ударил ${name} на ${pDmg}. (Враг: ${Math.max(0, curE)} HP)<br>`;
                
                if(curE <= 0) {
                    clearInterval(fight);
                    player.coins += reward; player.lvl += 1; player.atk += 3;
                    log.innerHTML += `<b style="color: #44ff44;">Победа! +${reward} золота. Атака выросла!</b>`;
                    renderStats();
                    setTimeout(() => tg.sendData(JSON.stringify({action: "save", lvl: player.lvl, coins: player.coins, atk: player.atk})), 1500);
                    return;
                }

                let eDmg = Math.max(1, eAtk - Math.floor(player.def/5));
                curP -= eDmg;
                log.innerHTML += `<span style="color: #ff4747;">${name} кусает тебя на ${eDmg}. (Ты: ${curP} HP)</span><br>`;
                log.scrollTop = log.scrollHeight;

                if(curP <= 0) {
                    clearInterval(fight);
                    log.innerHTML += `💀 Ты проиграл...`;
                    setTimeout(() => tg.close(), 1500);
                }
            }, 800);
        }

        renderStats();
    </script>
</body>
</html>
