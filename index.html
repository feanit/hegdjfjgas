<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --red: #ff4747; --green: #44ff44; }
        body { background: var(--dark); color: #e0e0e0; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .enemy-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; margin-top: 8px; text-align: left; border-radius: 8px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; }
        .nav div { flex: 1; text-align: center; padding: 20px; color: #666; font-size: 12px; }
        .nav div.active { color: var(--gold); font-weight: bold; }
        #log { background: #000; height: 150px; overflow-y: auto; font-size: 13px; padding: 10px; border: 1px solid #333; margin: 10px 0; border-radius: 5px; }
        .hp-bar { width: 100%; background: #333; height: 8px; border-radius: 4px; margin: 5px 0 10px; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--red); transition: 0.3s; width: 100%; }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <h2 style="color: var(--gold)">ГЕРОЙ</h2>
        <div class="card" id="stats-display"></div>
    </div>

    <div id="inv-page" class="page">
        <h2 style="color: var(--gold)">ИНВЕНТАРЬ</h2>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <div style="aspect-ratio:1; background:#111; border:1px dashed #444; display:flex; align-items:center; justify-content:center;">⚔️</div>
            <div style="aspect-ratio:1; background:#111; border:1px dashed #444;"></div>
            <div style="aspect-ratio:1; background:#111; border:1px dashed #444;"></div>
            <div style="aspect-ratio:1; background:#111; border:1px dashed #444;"></div>
        </div>
    </div>

    <div id="loc-page" class="page">
        <div id="loc-select">
            <h2 style="color: var(--gold)">ЛОКАЦИИ</h2>
            <div class="card"><h3>🌲 Лес</h3><button class="btn" onclick="enterLoc('forest')">Войти</button></div>
            <div class="card"><h3>🏛 Руины</h3><button class="btn" onclick="enterLoc('ruins')">Войти</button></div>
        </div>

        <div id="enemy-view" style="display:none;">
            <button onclick="exitLoc()" style="color: var(--gold); background:none; border:none;">⬅ Назад</button>
            <div id="enemies-list"></div>
        </div>

        <div id="battle-view" style="display:none;">
            <h3 id="battle-title">БОЙ</h3>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div>
            <div class="hp-bar"><div id="player-hp" class="hp-fill" style="background:var(--green)"></div></div>
            <div id="log"></div>
            <div id="battle-res" style="display:none; text-align:center;">
                <h3 id="res-txt"></h3>
                <button class="btn" onclick="finishBattle()">СОХРАНИТЬ И ВЫЙТИ</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="nav-menu" class="active" onclick="tab('menu-page')">ГЕРОЙ</div>
        <div id="nav-inv" onclick="tab('inv-page')">РЮКЗАК</div>
        <div id="nav-loc" onclick="tab('loc-page')">ПОХОД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlP = new URLSearchParams(window.location.search);

        let p = {
            lvl: parseInt(urlP.get('lvl')) || 1,
            atk: parseInt(urlP.get('atk')) || 12,
            coins: parseInt(urlP.get('coins')) || 0,
            hp: 100
        };

        function draw() {
            document.getElementById('stats-display').innerHTML = `
                <p>Уровень: ${p.lvl}</p>
                <p>Атака: <b style="color:var(--red)">${p.atk}</b></p>
                <p>Золото: <b style="color:var(--gold)">${p.coins}</b></p>
            `;
        }

        function tab(id) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'loc-page') exitLoc();
        }

        const locs = {
            forest: { n: "Лес", e: [{n: "Слайм", h: 40, a: 5, r: 20}] },
            ruins: { n: "Руины", e: [{n: "Скелет", h: 100, a: 15, r: 80}] }
        };

        function enterLoc(k) {
            document.getElementById('loc-select').style.display = 'none';
            document.getElementById('enemy-view').style.display = 'block';
            let h = '';
            locs[k].e.forEach(en => {
                h += `<button class="enemy-btn" onclick="startFight('${en.n}', ${en.h}, ${en.a}, ${en.r})">⚔️ ${en.n}</button>`;
            });
            document.getElementById('enemies-list').innerHTML = h;
        }

        function exitLoc() {
            document.getElementById('loc-select').style.display = 'block';
            document.getElementById('enemy-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'none';
        }

        function startFight(n, h, a, r) {
            document.getElementById('enemy-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'block';
            document.getElementById('battle-res').style.display = 'none';
            let l = document.getElementById('log');
            l.innerHTML = 'Бой начался...<br>';
            let ch = h, cp = p.hp;

            let itv = setInterval(() => {
                let d = Math.floor(p.atk * (0.8 + Math.random()*0.4));
                ch -= d;
                l.innerHTML += `Урон: ${d}. Враг: ${Math.max(0, ch)} HP<br>`;
                document.getElementById('enemy-hp').style.width = (ch/h*100)+'%';
                if(ch <= 0) {
                    clearInterval(itv);
                    p.lvl++; p.coins += r; p.atk += 2;
                    document.getElementById('battle-res').style.display = 'block';
                    document.getElementById('res-txt').innerText = 'ПОБЕДА!';
                    return;
                }
                let ed = Math.max(1, a - 3);
                cp -= ed;
                l.innerHTML += `Вам нанесли ${ed} урона.<br>`;
                document.getElementById('player-hp').style.width = (cp/100*100)+'%';
                l.scrollTop = l.scrollHeight;
                if(cp <= 0) { clearInterval(itv); tg.close(); }
            }, 800);
        }

        function finishBattle() {
            // Отправляем данные и закрываем (для работы без ngrok)
            tg.sendData(JSON.stringify({lvl: p.lvl, coins: p.coins, atk: p.atk}));
        }

        draw();
    </script>
</body>
</html>
