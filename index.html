<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #151515; }
        body {
            background-color: var(--dark); color: #e0e0e0;
            font-family: 'Roboto Mono', monospace; margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        h1, h2 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin: 15px 0; }
        .content { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .content.active { display: block; }

        /* Меню */
        .hero-card {
            width: 150px; height: 200px; background: linear-gradient(180deg, #222, #050505);
            border: 1px solid var(--gold); border-radius: 15px; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center; font-size: 80px;
        }
        .stats-grid { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .val { color: var(--gold); font-weight: bold; }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .inv-slot { aspect-ratio: 1/1; background: #1a1a1a; border: 1px dashed #444; border-radius: 8px; }

        /* Локации */
        .loc-btn {
            background: var(--card); border: 1px solid #333; color: white;
            padding: 15px; margin-bottom: 12px; border-radius: 10px; width: 100%; text-align: left;
        }
        .loc-btn:active { border-color: var(--gold); background: #222; }

        /* Навигация */
        .nav-bar { background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #555; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="tab-menu" class="content active">
        <h1>Ancient RPG</h1>
        <div class="hero-card">👤</div>
        <div class="stats-grid" id="stats"></div>
    </div>

    <div id="tab-inv" class="content">
        <h2>Инвентарь</h2>
        <div class="inv-grid">
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
    </div>

    <div id="tab-loc" class="content">
        <h2>Локации</h2>
        <button class="loc-btn" onclick="fight('Лес', 15)">🌲 Лес <small>(Награда: 15 🪙)</small></button>
        <button class="loc-btn" onclick="fight('Равнины', 40)">🌫 Равнины <small>(Награда: 40 🪙)</small></button>
        <button class="loc-btn" onclick="fight('Руины', 120)">🏛 Руины <small>(Награда: 120 🪙)</small></button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="openTab('menu', this)">Меню</div>
        <div class="nav-item" onclick="openTab('inv', this)">Инвентарь</div>
        <div class="nav-item" onclick="openTab('loc', this)">Локации</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        let player = {
            lvl: parseInt(params.get('lvl')) || 1,
            hp: parseInt(params.get('hp')) || 100,
            def: parseInt(params.get('def')) || 10,
            coins: parseInt(params.get('coins')) || 0
        };

        function render() {
            document.getElementById('stats').innerHTML = `
                <div class="stat-line"><span>Уровень</span> <span class="val">${player.lvl}</span></div>
                <div class="stat-line"><span>Здоровье</span> <span class="val" style="color:#ff4747">${player.hp}/100</span></div>
                <div class="stat-line"><span>Защита</span> <span class="val" style="color:#47a1ff">${player.def}</span></div>
                <div class="stat-line"><span>Монеты</span> <span class="val" style="color:#ffd700">${player.coins} 🪙</span></div>
            `;
        }

        function openTab(name, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            el.classList.add('active');
        }

        function fight(loc, reward) {
            player.coins += reward;
            render();
            tg.HapticFeedback.notificationOccurred('success');

            // Отправка боту для сохранения
            tg.sendData(JSON.stringify({
                action: 'save_progress',
                coins: player.coins,
                lvl: player.lvl
            }));
        }

        render();
    </script>
</body>
</html>
