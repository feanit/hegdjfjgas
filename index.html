<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --red: #ff4747; --green: #44ff44; }
        body { background: var(--dark); color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn { background: var(--gold); color: black; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .enemy-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; margin-top: 10px; text-align: left; border-radius: 10px; position: relative; }
        
        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .inv-slot { aspect-ratio: 1/1; background: #151515; border: 1px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav div { flex: 1; text-align: center; padding: 18px 0; color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav div.active { color: var(--gold); font-weight: bold; }

        /* Боевка */
        #log { background: #000; height: 180px; overflow-y: auto; font-size: 13px; padding: 12px; border: 1px solid #333; border-radius: 8px; margin: 15px 0; font-family: 'Courier New', monospace; color: #ccc; }
        .hp-bar { width: 100%; background: #222; height: 10px; border-radius: 5px; margin: 6px 0 12px; border: 1px solid #333; }
        .hp-fill { height: 100%; background: var(--red); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); width: 100%; border-radius: 5px; }
        
        .result-overlay { display: none; text-align: center; padding: 10px; background: rgba(26,26,26,0.9); border-radius: 10px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <h2 style="color: var(--gold)">ПЕРСОНАЖ</h2>
        <div class="card" id="stats-display">
            </div>
    </div>

    <div id="inv-page" class="page">
        <h2 style="color: var(--gold)">ИНВЕНТАРЬ</h2>
        <div class="inv-grid">
            <div class="inv-slot">⚔️</div><div class="inv-slot">🛡️</div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
    </div>

    <div id="loc-page" class="page">
        <div id="loc-select">
            <h2 style="color: var(--gold)">ЛОКАЦИИ</h2>
            <div class="card">
                <h3>🌲 Зачарованный Лес</h3>
                <button class="btn" onclick="enterLoc('forest')">Войти в лес</button>
            </div>
            <div class="card">
                <h3>🏛 Залы Мертвых</h3>
                <button class="btn" onclick="enterLoc('ruins')">Войти в руины</button>
            </div>
        </div>

        <div id="enemy-view" style="display:none;">
            <button onclick="exitLoc()" style="color: var(--gold); background: none; border: none; padding: 10px 0; cursor: pointer;">⬅ К списку локаций</button>
            <h3 id="cur-loc-name"></h3>
            <div id="enemies-list"></div>
        </div>

        <div id="battle-view" style="display:none;">
            <h3 id="enemy-title" style="text-align:center;">БИТВА</h3>
            <div style="font-size: 11px; color: #888;">ВРАГ</div>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div>
            <div style="font-size: 11px; color: #888;">ТВОЁ ЗДОРОВЬЕ</div>
            <div class="hp-bar"><div id="player-hp" class="hp-fill" style="background: var(--green)"></div></div>
            
            <div id="log"></div>
            
            <div id="battle-result" class="result-overlay">
                <h3 id="result-text"></h3>
                <button class="btn" onclick="finishBattle()">ЗАКОНЧИТЬ И ВЕРНУТЬСЯ</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="nav-menu" class="active" onclick="tab('menu-page')">Герой</div>
        <div id="nav-inv" onclick="tab('inv-page')">Инвентарь</div>
        <div id="nav-loc" onclick="tab('loc-page')">Поход</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        
        // Данные игрока
        let p = {
            id: urlParams.get('id'),
            lvl: parseInt(urlParams.get('lvl')) || 1,
            atk: parseInt(urlParams.get('atk')) || 12,
            coins: parseInt(urlParams.get('coins')) || 0,
            def: parseInt(urlParams.get('def')) || 15,
            hp: 100, 
            maxHp: 100
        };

        const world = {
            forest: { n: "Зачарованный Лес", e: [
                {n: "Слизь", h: 45, a: 5, r: 20},
                {n: "Лесной Волк", h: 80, a: 10, r: 55}
            ]},
            ruins: { n: "Залы Мертвых", e: [
                {n: "Скелет", h: 130, a: 18, r: 125},
                {n: "Древний Лич", h: 300, a: 35, r: 450}
            ]}
        };

        // Рендер статов в меню
        function drawStats() {
            document.getElementById('stats-display').innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Уровень:</span> <b>${p.lvl}</b></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Атака:</span> <b style="color:var(--red)">${p.atk} ⚔️</b></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Защита:</span> <b style="color:#47a1ff">${p.def} 🛡️</b></div>
                <div style="display:flex; justify-content:space-between;"><span>Золото:</span> <b style="color:var(--gold)">${p.coins} 🪙</b></div>
            `;
        }

        // Переключение вкладок
        function tab(id) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav div').forEach(nv => nv.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
        }

        function enterLoc(k) {
            document.getElementById('loc-select').style.display = 'none';
            document.getElementById('enemy-view').style.display = 'block';
            document.getElementById('cur-loc-name').innerText = world[k].n;
            let listHtml = '';
            world[k].e.forEach(en => {
                listHtml += `<button class="enemy-btn" onclick="startFight('${en.n}', ${en.h}, ${en.a}, ${en.r})">
                    <b>${en.n}</b> <br>
                    <small style="color:#888">HP: ${en.h} | ATK: ${en.a}</small>
                    <span style="position:absolute; right:15px; top:18px; color:var(--gold)">⚔️</span>
                </button>`;
            });
            document.getElementById('enemies-list').innerHTML = listHtml;
        }

        function exitLoc() {
            document.getElementById('loc-select').style.display = 'block';
            document.getElementById('enemy-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'none';
        }

        function startFight(name, eh, ea, rew) {
            document.getElementById('enemy-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'block';
            document.getElementById('enemy-title').innerText = name.toUpperCase();
            document.getElementById('battle-result').style.display = 'none';
            
            let log = document.getElementById('log');
            log.innerHTML = `<span style="color:var(--gold)">Бой начался!</span><br>`;
            
            let curE = eh, curP = p.hp;
            document.getElementById('enemy-hp').style.width = "100%";
            document.getElementById('player-hp').style.width = "100%";

            let battleLoop = setInterval(() => {
                // Твой ход
                let pDmg = Math.floor(p.atk * (0.8 + Math.random() * 0.5));
                curE -= pDmg;
                log.innerHTML += `Ты нанес ${pDmg} урона.<br>`;
                document.getElementById('enemy-hp').style.width = Math.max(0, (curE/eh*100)) + "%";

                if(curE <= 0) {
                    clearInterval(battleLoop);
                    p.lvl += 1; p.coins += rew; p.atk += 2; // Прокачка
                    showEndGame(`ПОБЕДА!<br>+${rew} 🪙 | +1 УРОВЕНЬ`, true);
                    return;
                }

                // Ход врага
                let eDmg = Math.max(2, ea - Math.floor(p.def / 5));
                curP -= eDmg;
                log.innerHTML += `<span style="color:var(--red)">${name} бьет на ${eDmg}.</span><br>`;
                document.getElementById('player-hp').style.width = Math.max(0, (curP/p.maxHp*100)) + "%";
                log.scrollTop = log.scrollHeight;

                if(curP <= 0) {
                    clearInterval(battleLoop);
                    showEndGame("ТЫ ПОВЕРЖЕН", false);
                }
            }, 800);
        }

        function showEndGame(msg, isWin) {
            const resBox = document.getElementById('battle-result');
            resBox.style.display = 'block';
            document.getElementById('result-text').innerHTML = msg;
            document.getElementById('result-text').style.color = isWin ? 'var(--green)' : 'var(--red)';
            tg.HapticFeedback.notificationOccurred(isWin ? 'success' : 'error');
        }

        // ГЛАВНОЕ: Сохранение без выхода
        function finishBattle() {
            // 1. Обновляем статы в меню сразу
            drawStats();
            
            // 2. Фоновое сохранение (если есть сервер)
            // Здесь можно использовать fetch('https://твой-сервер/save', {...})
            
            // 3. Возвращаем игрока в меню без закрытия приложения
            tab('menu-page');
            exitLoc();
            
            // Опционально: посылаем данные боту в фоне. 
            // ВНИМАНИЕ: tg.sendData ВСЕГДА закроет приложение. 
            // Чтобы НЕ закрывалось, мы просто полагаемся на то, что статы обновились в объекте 'p'.
        }

        drawStats();
    </script>
</body>
</html>
