<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --red: #ff4747; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Roboto Mono', monospace; margin: 0; padding-bottom: 70px; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .card { background: #151515; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .btn { background: #222; border: 1px solid #444; color: white; padding: 10px; width: 100%; margin-top: 5px; border-radius: 8px; text-align: left; }
        
        /* Бой */
        #battle-ui { display: none; text-align: center; }
        .hp-bar-bg { width: 100%; background: #333; height: 10px; margin: 5px 0; border-radius: 5px; }
        .hp-bar-fill { height: 100%; background: var(--red); width: 100%; transition: 0.3s; border-radius: 5px; }
        #log { background: #000; height: 150px; overflow-y: auto; font-size: 12px; padding: 10px; text-align: left; border: 1px solid #444; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-btn { color: #666; font-size: 12px; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="menu" class="content active">
        <h1>Ancient RPG</h1>
        <div class="card" id="player-stats"></div>
    </div>

    <div id="locations" class="content">
        <h2>Локации</h2>
        <div id="loc-list">
            <div class="card">
                <b>🌲 Лес Теней</b>
                <p style="font-size: 10px; color: #888;">Здесь водятся слабые монстры.</p>
                <button class="btn" onclick="showEnemies('лес')">Войти в локацию</button>
            </div>
            <div class="card">
                <b>🏛 Руины</b>
                <p style="font-size: 10px; color: #888;">Опасно! Древние стражи.</p>
                <button class="btn" onclick="showEnemies('руины')">Войти в локацию</button>
            </div>
        </div>

        <div id="enemy-list" style="display:none;">
            <button class="btn" style="color: var(--gold)" onclick="backToLocs()">⬅ Назад к списку</button>
            <h3 id="loc-title"></h3>
            <div id="enemies-here"></div>
        </div>

        <div id="battle-ui">
            <h2 id="enemy-name"></h2>
            <div class="hp-bar-bg"><div id="e-hp" class="hp-bar-fill"></div></div>
            <div class="hp-bar-bg"><div id="p-hp" class="hp-bar-fill" style="background: green"></div></div>
            <div id="log"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="tab('menu')">Герой</div>
        <div class="nav-btn" onclick="tab('locations')">Поход</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        let p = {
            lvl: parseInt(params.get('lvl')) || 1,
            atk: parseInt(params.get('atk')) || 10,
            def: parseInt(params.get('def')) || 15,
            coins: parseInt(params.get('coins')) || 0,
            hp: 100, maxHp: 100
        };

        const enemies = {
            'лес': [
                { name: 'Гоблин', hp: 40, atk: 5, reward: 20 },
                { name: 'Волк', hp: 60, atk: 8, reward: 45 }
            ],
            'руины': [
                { name: 'Скелет', hp: 120, atk: 15, reward: 100 },
                { name: 'Голем', hp: 300, atk: 25, reward: 300 }
            ]
        };

        function updateStats() {
            document.getElementById('player-stats').innerHTML = `
                <p>Уровень: ${p.lvl}</p>
                <p>Урон: ${p.atk}</p>
                <p>Монеты: ${p.coins} 🪙</p>
            `;
        }

        function tab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            backToLocs();
        }

        function showEnemies(locKey) {
            document.getElementById('loc-list').style.display = 'none';
            document.getElementById('enemy-list').style.display = 'block';
            document.getElementById('loc-title').innerText = locKey.toUpperCase();
            let html = '';
            enemies[locKey].forEach(e => {
                html += `<button class="btn" onclick="startFight('${e.name}', ${e.hp}, ${e.atk}, ${e.reward})">
                    ⚔ Напасть на: ${e.name} (HP: ${e.hp}, ATK: ${e.atk})
                </button>`;
            });
            document.getElementById('enemies-here').innerHTML = html;
        }

        function backToLocs() {
            document.getElementById('loc-list').style.display = 'block';
            document.getElementById('enemy-list').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'none';
        }

        function startFight(name, eHp, eAtk, reward) {
            document.getElementById('enemy-list').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'block';
            document.getElementById('enemy-name').innerText = name;
            let curE = eHp, curP = p.hp;
            let log = document.getElementById('log');
            log.innerHTML = 'Бой начался!<br>';

            const iter = setInterval(() => {
                let dmgP = Math.floor(p.atk * (0.8 + Math.random() * 0.4));
                curE -= dmgP;
                log.innerHTML += `Ты ударил на ${dmgP}. У врага ${Math.max(0, curE)} HP<br>`;
                document.getElementById('e-hp').style.width = (curE/eHp*100) + '%';

                if(curE <= 0) {
                    clearInterval(iter);
                    p.coins += reward; p.lvl += 1; p.atk += 2;
                    log.innerHTML += `<b>ПОБЕДА! +${reward} монет.</b>`;
                    updateStats();
                    setTimeout(() => tg.sendData(JSON.stringify({action:'save_progress', lvl:p.lvl, coins:p.coins, atk:p.atk})), 2000);
                    return;
                }

                let dmgE = Math.max(1, eAtk - Math.floor(p.def/5));
                curP -= dmgE;
                log.innerHTML += `Враг ударил на ${dmgE}. У тебя ${Math.max(0, curP)} HP<br>`;
                document.getElementById('p-hp').style.width = (curP/p.maxHp*100) + '%';
                log.scrollTop = log.scrollHeight;

                if(curP <= 0) {
                    clearInterval(iter);
                    log.innerHTML += `ТЫ ПРОИГРАЛ...`;
                    setTimeout(() => tg.close(), 2000);
                }
            }, 800);
        }

        updateStats();
    </script>
</body>
</html>
