<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ancient RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --red: #ff4747; --green: #44ff44; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .enemy-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; margin-top: 8px; text-align: left; border-radius: 8px; }
        
        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .inv-slot { aspect-ratio: 1/1; background: #151515; border: 1px dashed #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; z-index: 100; }
        .nav div { flex: 1; text-align: center; padding: 15px; color: #666; font-size: 11px; text-transform: uppercase; }
        .nav div.active { color: var(--gold); font-weight: bold; border-top: 2px solid var(--gold); }
        
        #log { background: #000; height: 180px; overflow-y: auto; font-size: 13px; padding: 10px; border: 1px solid #444; margin-top: 10px; border-radius: 5px; line-height: 1.5; }
        .hp-bar { width: 100%; background: #333; height: 8px; border-radius: 4px; margin: 5px 0 10px; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--red); transition: 0.3s; width: 100%; }
        
        .result-screen { display: none; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <h2 style="color: var(--gold)">ГЕРОЙ</h2>
        <div class="card" id="stats-display"></div>
    </div>

    <div id="inv-page" class="page">
        <h2 style="color: var(--gold)">ИНВЕНТАРЬ</h2>
        <div class="inv-grid">
            <div class="inv-slot">⚔️</div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
    </div>

    <div id="loc-page" class="page">
        <h2 style="color: var(--gold)">ЛОКАЦИИ</h2>
        
        <div id="loc-select">
            <div class="card">
                <h3>🌲 Зачарованный Лес</h3>
                <button class="btn" onclick="enterLoc('forest')">Войти</button>
            </div>
            <div class="card">
                <h3>🏛 Залы Мертвых</h3>
                <button class="btn" onclick="enterLoc('ruins')">Войти</button>
            </div>
        </div>

        <div id="enemy-view" style="display:none;">
            <button onclick="exitLoc()" style="color: var(--gold); background: none; border: none; padding: 10px 0;">⬅ Назад</button>
            <h3 id="cur-loc-name"></h3>
            <div id="enemies-list"></div>
        </div>

        <div id="battle-view" style="display:none;">
            <h3 id="enemy-title"></h3>
            <div style="font-size: 10px; color: #888;">HP ВРАГА</div>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div>
            <div style="font-size: 10px; color: #888;">ТВОЁ HP</div>
            <div class="hp-bar"><div id="player-hp" class="hp-fill" style="background: var(--green)"></div></div>
            <div id="log"></div>
            
            <div id="battle-result" class="result-screen">
                <h3 id="result-text"></h3>
                <button class="btn" onclick="saveAndExit()">ПОДТВЕРДИТЬ И ВЫЙТИ</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="nav-menu" class="active" onclick="tab('menu-page')">Герой</div>
        <div id="nav-inv" onclick="tab('inv-page')">Рюкзак</div>
        <div id="nav-loc" onclick="tab('loc-page')">Поход</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const urlP = new URLSearchParams(window.location.search);
        
        let p = {
            lvl: parseInt(urlP.get('lvl')) || 1,
            atk: parseInt(urlP.get('atk')) || 12,
            coins: parseInt(urlP.get('coins')) || 0,
            def: parseInt(urlP.get('def')) || 15,
            hp: 100, maxHp: 100
        };

        const locs = {
            forest: { n: "Зачарованный Лес", e: [
                {n: "Слизь", h: 40, a: 6, r: 25},
                {n: "Лесной Волк", h: 80, a: 12, r: 60}
            ]},
            ruins: { n: "Залы Мертвых", e: [
                {n: "Скелет", h: 120, a: 20, r: 120},
                {n: "Древний Лич", h: 250, a: 35, r: 400}
            ]}
        };

        let lastBattleWin = false;

        function drawStats() {
            document.getElementById('stats-display').innerHTML = `
                <p>Уровень: <b>${p.lvl}</b></p>
                <p>Атака: <b style="color: var(--red);">${p.atk} ⚔️</b></p>
                <p>Защита: <b>${p.def} 🛡</b></p>
                <p>Золото: <b style="color: var(--gold);">${p.coins} 🪙</b></p>
            `;
        }

        function tab(id) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav div').forEach(nv => nv.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
            if (id !== 'loc-page') exitLoc();
        }

        function enterLoc(k) {
            document.getElementById('loc-select').style.display = 'none';
            document.getElementById('enemy-view').style.display = 'block';
            document.getElementById('cur-loc-name').innerText = locs[k].n;
            let h = '';
            locs[k].e.forEach(en => {
                h += `<button class="enemy-btn" onclick="fight('${en.n}', ${en.h}, ${en.a}, ${en.r})">
                    💀 ${en.n} <span style="float:right; font-size:10px; color:#aaa;">HP:${en.h} ATK:${en.a}</span>
                </button>`;
            });
            document.getElementById('enemies-list').innerHTML = h;
        }

        function exitLoc() {
            document.getElementById('loc-select').style.display = 'block';
            document.getElementById('enemy-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'none';
            document.getElementById('battle-result').style.display = 'none';
        }

        function fight(name, eh, ea, rew) {
            document.getElementById('enemy-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'block';
            document.getElementById('enemy-title').innerText = "БОЙ ПРОТИВ " + name.toUpperCase();
            let log = document.getElementById('log');
            log.innerHTML = "⚔️ Подготовка к атаке...<br>";
            
            let ce = eh, cp = p.hp;
            let loop = setInterval(() => {
                // Твой ход
                let pd = Math.floor(p.atk * (0.8 + Math.random()*0.5));
                ce -= pd;
                log.innerHTML += `💥 Ты ударил на <b>${pd}</b>.<br>`;
                document.getElementById('enemy-hp').style.width = Math.max(0, (ce/eh*100)) + "%";
                
                if(ce <= 0) {
                    clearInterval(loop);
                    p.coins += rew; p.lvl += 1; p.atk += 3;
                    lastBattleWin = true;
                    showResult(`ПОБЕДА!<br><span style="color:var(--gold)">+${rew} 🪙 и +1 УРОВЕНЬ</span>`);
                    return;
                }

                // Ход врага
                let ed = Math.max(2, ea - Math.floor(p.def/4));
                cp -= ed;
                log.innerHTML += `🩸 ${name} нанес <b>${ed}</b> урона.<br>`;
                document.getElementById('player-hp').style.width = Math.max(0, (cp/p.maxHp*100)) + "%";
                log.scrollTop = log.scrollHeight;

                if(cp <= 0) {
                    clearInterval(loop);
                    lastBattleWin = false;
                    showResult(`ТЫ ПОВЕРЖЕН...<br><span style="color:var(--red)">Попробуй стать сильнее!</span>`);
                }
            }, 800);
        }

        function showResult(text) {
            const res = document.getElementById('battle-result');
            res.style.display = 'block';
            document.getElementById('result-text').innerHTML = text;
            tg.HapticFeedback.notificationOccurred(lastBattleWin ? 'success' : 'error');
        }

        function saveAndExit() {
            tg.sendData(JSON.stringify({
                action: "save", 
                lvl: p.lvl, 
                coins: p.coins, 
                atk: p.atk,
                win: lastBattleWin
            }));
        }

        drawStats();
    </script>
</body>
</html>
